}

function showT(t) {
  curTrad = t.dir;
  document.getElementById('ov').style.display = 'none';
  document.getElementById('cv').style.display = 'block';
  document.getElementById('fb').style.display = 'flex';
  document.getElementById('backbtn').style.display = 'inline-block';
  document.getElementById('mhT').textContent = t.label;
  document.getElementById('mhM').textContent = t.count + ' créature' + (t.count > 1 ? 's' : '') + ' · ' + t.zone;
  document.getElementById('fq').value = '';
  renderSB();
  renderC();
}

function renderC() {
  var trad = null;
  for (var i = 0; i < DATA.length; i++) { if (DATA[i].dir === curTrad) { trad = DATA[i]; break; } }
  if (!trad) return;
  var sort = document.getElementById('fsort').value;
  var stat = document.getElementById('fstat').value;
  var q = document.getElementById('fq').value.toLowerCase();
  var list = trad.creatures.slice();
  if (stat !== 'all') list = list.filter(function(c) { return c.statut === stat; });
  if (q) list = list.filter(function(c) { return c.nom.toLowerCase().indexOf(q) !== -1 || c.categorie.toLowerCase().indexOf(q) !== -1; });
  if (sort === 'alpha') list.sort(function(a,b) { return a.nom.localeCompare(b.nom); });
  else if (sort === 'date') list.sort(function(a,b) { return (b.date||'').localeCompare(a.date||''); });
  var cg = document.getElementById('cg');
  cg.innerHTML = '';
  var es = document.getElementById('es');
  if (list.length === 0) { es.style.display = ''; return; }
  es.style.display = 'none';
  list.forEach(function(c) {
    var card = document.createElement('div');
    card.className = 'cc';
    card.innerHTML = '<div class="ci"><span>&#128009;</span></div><div class="cb"><div class="cn">' + escHtml(c.nom) + '</div><div class="ccat">' + escHtml(c.categorie || '') + '</div></div><div class="cbadge"><span class="bdg">&#10003; valid&#233;</span></div>';
    card.onclick = (function(tdir, creature) { return function() { openM(tdir, creature); }; })(trad.dir, c);
    cg.appendChild(card);
  });
}

function renderOv() {
  var og = document.getElementById('og');
  og.innerHTML = '';
  var zones = {};
  DATA.forEach(function(t) { if (!zones[t.zone]) zones[t.zone] = []; zones[t.zone].push(t); });
  var mx = 1;
  DATA.forEach(function(t) { if (t.count > mx) mx = t.count; });
  Object.keys(zones).sort().forEach(function(zone) {
    var trads = zones[zone];
    var card = document.createElement('div');
    card.className = 'zc';
    var tot = trads.reduce(function(s,t) { return s + t.count; }, 0);
    card.innerHTML = '<h3>' + escHtml(zone) + ' <span style="color:var(--a);margin-left:6px">' + tot + '</span></h3>';
    trads.forEach(function(t) {
      var pct = Math.min(100, (t.count / mx) * 100);
      var row = document.createElement('div');
      row.className = 'trow';
      row.innerHTML = '<span class="tname">' + escHtml(t.label) + '</span><div class="bw"><div class="bv" style="width:' + pct + '%"></div></div><span class="tc2">' + t.count + '</span>';
      row.onclick = (function(trad) { return function() { showT(trad); }; })(t);
      card.appendChild(row);
    });
    og.appendChild(card);
  });
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function openM(tradDir, c) {
  curCreature = {tradDir: tradDir, slug: c.slug, nom: c.nom, categorie: c.categorie};
  document.getElementById('mdt').textContent = c.nom;
  document.getElementById('vr').style.display = 'none';
  document.getElementById('mdtxt').textContent = 'Chargement...';
  document.getElementById('mo').classList.add('on');
  var url = tradDir + '/creatures/' + c.slug + '.md';
  fetch(url)
    .then(function(r) { return r.ok ? r.text() : Promise.reject(r.status); })
    .then(function(txt) {
      var lines = txt.split('\n');
      var out = [];
      var inFront = false, frontDone = false, count = 0;
      for (var i = 0; i < lines.length; i++) {
        var l = lines[i];
        if (i === 0 && l.trim() === '---') { inFront = true; continue; }
        if (inFront && l.trim() === '---') { inFront = false; frontDone = true; continue; }
        if (inFront) continue;
        out.push(l);
        count++;
        if (count > 300) { out.push('...'); break; }
      }
      document.getElementById('mdtxt').textContent = out.join('\n').trim();
    })
    .catch(function() {
      document.getElementById('mdtxt').textContent = 'Nom : ' + c.nom + '\nCatégorie : ' + (c.categorie || '—') + '\nStatut : ' + (c.statut || '—') + '\nDate : ' + (c.date || '—');
    });
}

function closeM() { document.getElementById('mo').classList.remove('on'); curCreature = null; }

function doVerify() {
  if (!curCreature) return;
  var q = curCreature.nom + ' ' + curCreature.categorie + ' folklore tradition';
  document.getElementById('vq').textContent = q;
  document.getElementById('vr').style.display = '';
}

function doExport() {
  if (!curCreature) return;
  var out = '\u{1F409} ' + curCreature.nom + '\n\n' + curCreature.categorie + '\n\n#bestiaire #folklore #mythologie #bestiairemondial';
  navigator.clipboard.writeText(out).then(function() { toast('Copié !'); });
}

function copyQ() { navigator.clipboard.writeText(document.getElementById('vq').textContent).then(function() { toast('Requête copiée !'); }); }

function toast(msg) {
  var t = document.getElementById('toast'); t.textContent = msg; t.classList.add('on');
  setTimeout(function() { t.classList.remove('on'); }, 2500);
}

document.querySelectorAll('.zb').forEach(function(b) {
  b.onclick = function() {
    activeZone = b.dataset.z;
    document.querySelectorAll('.zb').forEach(function(x) { x.classList.remove('on'); });
    b.classList.add('on');
    renderSB();
  };
});

document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeM(); });

renderSB();
renderOv();
</script>
</body>
</html>
