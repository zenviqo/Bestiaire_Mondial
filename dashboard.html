<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bestiaire Mondial</title>
<style>
:root{--bg:#0d0d0d;--s:#161616;--s2:#1e1e1e;--b:#2a2a2a;--a:#c8a96e;--a2:#8b6914;--t:#e8e0d0;--t2:#888;--g:#4caf82;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--t);font-family:Georgia,serif;display:flex;height:100vh;overflow:hidden;}

/* ── SIDEBAR ── */
#sb{width:260px;min-width:220px;background:var(--s);border-right:1px solid var(--b);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;}
#sbh{padding:14px 16px;border-bottom:1px solid var(--b);background:linear-gradient(135deg,#1a1206,#1e1e1e);}
#sbh h1{font-size:.88rem;color:var(--a);letter-spacing:2px;text-transform:uppercase;}
#sbh p{font-size:.65rem;color:var(--t2);margin-top:2px;font-style:italic;}
#stats{padding:8px 16px;border-bottom:1px solid var(--b);display:flex;gap:12px;align-items:center;}
.stat{text-align:center;flex:1;}.stat b{display:block;font-size:1.15rem;color:var(--a);line-height:1;}
.stat span{font-size:.6rem;color:var(--t2);text-transform:uppercase;letter-spacing:1px;}
#search{padding:7px 16px;border-bottom:1px solid var(--b);}
#search input{width:100%;background:var(--s2);border:1px solid var(--b);color:var(--t);padding:6px 10px;font-size:.75rem;border-radius:4px;font-family:inherit;outline:none;}
#search input:focus{border-color:var(--a2);}
#tlist{overflow-y:auto;flex:1;}
.titem{padding:8px 16px;border-bottom:1px solid var(--b);cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .15s;}
.titem:hover{background:var(--s2);}
.titem.active{background:rgba(200,169,110,.1);border-left:3px solid var(--a);padding-left:13px;}
.tname{flex:1;font-size:.82rem;}
.tcount{font-size:.7rem;color:var(--a);font-weight:bold;min-width:26px;text-align:right;}
.tcount.zero{color:var(--t2);font-weight:normal;}
.timg{font-size:.65rem;color:var(--g);margin-left:2px;}

/* ── MAIN ── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
#mh{padding:10px 20px;border-bottom:1px solid var(--b);background:var(--s);display:flex;align-items:center;gap:10px;}
#mh h2{font-size:.95rem;color:var(--a);flex:1;}
#mh .sub{font-size:.72rem;color:var(--t2);}
/* filtres par type */
#typefilter{padding:7px 20px;border-bottom:1px solid var(--b);background:var(--s2);display:flex;gap:6px;flex-wrap:wrap;}
.tfbtn{padding:3px 10px;font-size:.68rem;border:1px solid var(--b);background:transparent;color:var(--t2);cursor:pointer;border-radius:12px;font-family:inherit;transition:all .15s;}
.tfbtn:hover{border-color:var(--a2);color:var(--a);}
.tfbtn.on{border-color:var(--a);color:var(--a);background:rgba(200,169,110,.1);}
.tfbtn .cnt{font-size:.6rem;opacity:.7;margin-left:2px;}
/* type badge sur les cartes */
.ctype{position:absolute;top:4px;left:4px;font-size:.55rem;padding:1px 5px;border-radius:3px;font-weight:bold;text-transform:uppercase;letter-spacing:.5px;}
.type-créature{background:rgba(76,175,130,.8);color:#fff;}
.type-esprit{background:rgba(100,130,200,.8);color:#fff;}
.type-géant{background:rgba(180,80,60,.8);color:#fff;}
.type-divinité{background:rgba(200,169,110,.8);color:#111;}
.type-héros{background:rgba(130,100,180,.8);color:#fff;}
#grid-wrap{flex:1;overflow-y:auto;padding:16px 20px;}
#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;}
.ccard{background:var(--s);border:1px solid var(--b);border-radius:6px;overflow:hidden;cursor:pointer;transition:all .18s;position:relative;}
.ccard:hover{border-color:var(--a2);transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.4);}
.ccard.has-img{border-color:rgba(200,169,110,.25);}
.cimg{width:100%;height:110px;background:var(--s2);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;}
.cimg img{width:100%;height:100%;object-fit:cover;object-position:top;}
.cimg .noimg{font-size:2rem;color:var(--b);user-select:none;}
.cimg .imgbadge{position:absolute;bottom:4px;right:4px;background:rgba(76,175,130,.85);color:#fff;font-size:.58rem;padding:1px 5px;border-radius:3px;font-family:monospace;}
.cbody{padding:8px 8px 6px;}
.cnom{font-size:.82rem;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ccat{font-size:.6rem;color:var(--t2);line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
#empty{display:none;text-align:center;padding:60px 20px;color:var(--t2);font-style:italic;font-size:.9rem;}

/* ── MODAL ── */
#mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:100;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto;}
#mo.on{display:flex;}
#md{background:var(--s);border:1px solid var(--b);border-radius:8px;width:100%;max-width:820px;margin:auto;display:flex;flex-direction:column;overflow:hidden;}
#mdtop{padding:12px 16px;border-bottom:1px solid var(--b);display:flex;align-items:center;gap:10px;background:linear-gradient(135deg,#1a1206,#1e1e1e);}
#mdnom{font-size:1.1rem;color:var(--a);flex:1;}
#mdcat{font-size:.7rem;color:var(--t2);font-style:italic;margin-top:2px;}
#mdcl{background:none;border:1px solid var(--b);color:var(--t2);width:28px;height:28px;cursor:pointer;border-radius:4px;font-size:1rem;line-height:1;flex-shrink:0;}
#mdcl:hover{border-color:var(--a);color:var(--a);}

/* Image zones */
#imgrow{display:flex;gap:10px;padding:12px 16px;border-bottom:1px solid var(--b);background:var(--s2);}
.imgzone{flex:1;min-height:160px;border:2px dashed var(--b);border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden;transition:border-color .2s;}
.imgzone.over{border-color:var(--a);background:rgba(200,169,110,.06);}
.imgzone img{width:100%;height:100%;object-fit:contain;position:absolute;inset:0;}
.imgzone .drop-hint{display:flex;flex-direction:column;align-items:center;gap:6px;color:var(--t2);font-size:.72rem;text-align:center;padding:10px;z-index:1;pointer-events:none;}
.imgzone .drop-hint .ico{font-size:1.8rem;}
.imgzone .drop-label{position:absolute;top:5px;left:6px;font-size:.6rem;color:var(--a2);background:rgba(0,0,0,.6);padding:1px 5px;border-radius:3px;z-index:2;}
.imgzone.has-img .drop-hint{opacity:0;}
.imgzone.has-img:hover .drop-hint{opacity:1;background:rgba(0,0,0,.55);}
.imgzone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;z-index:3;}

/* Markdown content */
#mdcontent{padding:16px 20px;overflow-y:auto;max-height:55vh;}
.md-section{margin-bottom:18px;}
.md-h2{font-size:.78rem;color:var(--a);text-transform:uppercase;letter-spacing:2px;border-bottom:1px solid var(--b);padding-bottom:5px;margin-bottom:8px;}
.md-h3{font-size:.75rem;color:var(--a2);margin-bottom:5px;font-style:italic;}
.md-p{font-size:.82rem;line-height:1.7;color:var(--t);margin-bottom:6px;}
.md-li{font-size:.8rem;line-height:1.6;color:var(--t);padding-left:16px;position:relative;margin-bottom:2px;}
.md-li::before{content:"–";position:absolute;left:4px;color:var(--a2);}
.md-em{color:var(--a);font-style:italic;}
.md-prompt{background:var(--s2);border:1px solid var(--b);border-radius:4px;padding:10px 12px;font-size:.75rem;font-family:monospace;line-height:1.5;color:var(--t2);word-break:break-word;}

/* Toast */
#toast{position:fixed;bottom:16px;right:16px;background:var(--s2);border:1px solid var(--b);color:var(--t);padding:8px 14px;border-radius:5px;font-size:.78rem;transform:translateY(40px);opacity:0;transition:all .25s;z-index:200;}
#toast.on{transform:translateY(0);opacity:1;}

::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--s);}
::-webkit-scrollbar-thumb{background:var(--b);border-radius:3px;}
</style>
</head>
<body>

<div id="sb">
  <div id="sbh">
    <h1>Bestiaire Mondial</h1>
    <p>Atlas mythologique de l'humanité</p>
  </div>
  <div id="stats">
    <div class="stat"><b id="tot-c">…</b><span>créatures</span></div>
    <div class="stat"><b id="tot-i">…</b><span>images</span></div>
    <div class="stat"><b id="tot-t">…</b><span>traditions</span></div>
  </div>
  <div id="search"><input id="sq" type="text" placeholder="Rechercher une créature…" oninput="onSearch()"></div>
  <div id="tlist"></div>
</div>

<div id="main">
  <div id="mh">
    <div>
      <h2 id="mtitle">Sélectionner une tradition</h2>
      <div class="sub" id="msub"></div>
    </div>
  </div>
  <div id="typefilter">
    <button class="tfbtn" data-type="créature">🐉 Créatures</button>
    <button class="tfbtn" data-type="esprit">👻 Esprits</button>
    <button class="tfbtn" data-type="géant">🗿 Géants</button>
    <button class="tfbtn" data-type="divinité">⚡ Divinités</button>
    <button class="tfbtn" data-type="héros">⚔️ Héros</button>
    <button class="tfbtn on" data-type="all">Tous</button>
  </div>
  <div id="grid-wrap">
    <div id="grid"></div>
    <div id="empty">Sélectionne une tradition dans le menu de gauche</div>
  </div>
</div>

<!-- Modal -->
<div id="mo" onclick="if(event.target===this)closeModal()">
  <div id="md">
    <div id="mdtop">
      <div style="flex:1">
        <div id="mdnom">—</div>
        <div id="mdcat"></div>
      </div>
      <button id="mdcl" onclick="closeModal()">✕</button>
    </div>
    <div id="imgrow">
      <div class="imgzone" id="zone1" ondragover="onDragOver(event,1)" ondrop="onDrop(event,1)" ondragleave="onDragLeave(1)">
        <span class="drop-label">Page 1</span>
        <input type="file" accept="image/*" onchange="onFileInput(event,1)">
        <div class="drop-hint"><div class="ico">🖼</div>Déposer l'image AI ici<br><small>ou cliquer pour choisir</small></div>
      </div>
      <div class="imgzone" id="zone2" ondragover="onDragOver(event,2)" ondrop="onDrop(event,2)" ondragleave="onDragLeave(2)">
        <span class="drop-label">Page 2</span>
        <input type="file" accept="image/*" onchange="onFileInput(event,2)">
        <div class="drop-hint"><div class="ico">🦴</div>Déposer l'image AI ici<br><small>ou cliquer pour choisir</small></div>
      </div>
    </div>
    <div id="mdcontent"><p style="color:var(--t2);font-size:.8rem;font-style:italic">Chargement…</p></div>
  </div>
</div>

<div id="toast"></div>

<script>
let DATA = [];
let activeTrad = null;
let activeType = 'all';
let curCreature = null; // {dir, slug, nom, categorie, img1, img2}

// ── LOAD DATA ──
async function loadData() {
  try {
    const r = await fetch('/api/data');
    DATA = await r.json();
    renderSidebar();
    updateStats();
    document.getElementById('empty').style.display = 'block';
  } catch(e) {
    document.getElementById('empty').textContent = 'Erreur : serveur non démarré. Lance start.sh';
    document.getElementById('empty').style.display = 'block';
  }
}

function updateStats() {
  let tc = 0, ti = 0;
  DATA.forEach(t => {
    tc += t.creatures.length;
    t.creatures.forEach(c => { if(c.img1 || c.img2) ti++; });
  });
  document.getElementById('tot-c').textContent = tc;
  document.getElementById('tot-i').textContent = ti;
  document.getElementById('tot-t').textContent = DATA.filter(t=>t.creatures.length>0).length;
}

// ── SIDEBAR ──
function renderSidebar(filter='') {
  const tlist = document.getElementById('tlist');
  tlist.innerHTML = '';
  DATA.forEach(t => {
    const creatures = filter
      ? t.creatures.filter(c => matchSearch(c, filter))
      : t.creatures;
    const total = creatures.length;
    const imgs = creatures.filter(c=>c.img1||c.img2).length;
    const div = document.createElement('div');
    div.className = 'titem' + (activeTrad === t.dir ? ' active' : '');
    div.innerHTML = `<span class="tname">${t.label}</span>
      ${imgs ? `<span class="timg">📷${imgs}</span>` : ''}
      <span class="tcount ${total?'':'zero'}">${total}</span>`;
    div.onclick = () => selectTrad(t.dir, filter);
    tlist.appendChild(div);
  });
}

function selectTrad(dir, filter='') {
  activeTrad = dir;
  renderSidebar(filter);
  const trad = DATA.find(t => t.dir === dir);
  if (!trad) return;
  let creatures = trad.creatures;
  if (filter) creatures = creatures.filter(c => matchSearch(c, filter));
  creatures = creatures.filter(c => matchType(c));
  document.getElementById('mtitle').textContent = trad.label;
  document.getElementById('msub').textContent = `${creatures.length} entrée${creatures.length>1?'s':''} · ${trad.zone}`;
  renderGrid(dir, creatures);
  document.getElementById('empty').style.display = creatures.length ? 'none' : 'block';
  if (!creatures.length) document.getElementById('empty').textContent = 'Aucune entrée pour ce filtre';
  updateTypeCounters();
}

// ── GRID ──
function renderGrid(dir, creatures) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  creatures.forEach(c => {
    const card = document.createElement('div');
    const hasImg = !!(c.img1 || c.img2);
    card.className = 'ccard' + (hasImg ? ' has-img' : '');
    const imgHtml = c.img1
      ? `<img src="${c.img1}" loading="lazy" alt="">`
      : `<div class="noimg">☽</div>`;
    const badge = hasImg ? `<div class="imgbadge">📷 ${(c.img1?1:0)+(c.img2?1:0)}/2</div>` : '';
    const typeBadge = `<div class="ctype type-${c.type||'créature'}">${c.type||'?'}</div>`;
    card.innerHTML = `
      <div class="cimg">${imgHtml}${badge}${typeBadge}</div>
      <div class="cbody">
        <div class="cnom">${c.nom}</div>
        <div class="ccat">${c.categorie}</div>
      </div>`;
    card.onclick = () => openModal(dir, c);
    grid.appendChild(card);
  });
}

// ── SEARCH ──
function matchSearch(c, q) {
  const lq = q.toLowerCase();
  return c.nom.toLowerCase().includes(lq) || c.categorie.toLowerCase().includes(lq) || c.slug.toLowerCase().includes(lq);
}

function matchType(c) {
  return activeType === 'all' || c.type === activeType;
}

function onSearch() {
  const q = document.getElementById('sq').value.trim();
  if (activeTrad) selectTrad(activeTrad, q);
  else renderSidebar(q);
}

// Type filter buttons
document.querySelectorAll('.tfbtn').forEach(btn => {
  btn.onclick = () => {
    activeType = btn.dataset.type;
    document.querySelectorAll('.tfbtn').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    if (activeTrad) selectTrad(activeTrad, document.getElementById('sq').value.trim());
    updateTypeCounters();
  };
});

function updateTypeCounters() {
  if (!activeTrad) return;
  const trad = DATA.find(t => t.dir === activeTrad);
  if (!trad) return;
  document.querySelectorAll('.tfbtn').forEach(btn => {
    const t = btn.dataset.type;
    const n = t === 'all' ? trad.creatures.length : trad.creatures.filter(c => c.type === t).length;
    btn.querySelector('.cnt') && btn.querySelector('.cnt').remove();
    const sp = document.createElement('span');
    sp.className = 'cnt'; sp.textContent = n;
    btn.appendChild(sp);
  });
}

// ── MODAL ──
async function openModal(dir, c) {
  curCreature = { dir, slug: c.slug, nom: c.nom, categorie: c.categorie };
  document.getElementById('mdnom').textContent = c.nom;
  document.getElementById('mdcat').textContent = c.categorie;
  document.getElementById('mdcontent').innerHTML = '<p style="color:var(--t2);font-size:.8rem;font-style:italic">Chargement…</p>';

  // Images
  setZoneImage(1, c.img1);
  setZoneImage(2, c.img2);

  document.getElementById('mo').classList.add('on');

  // Load MD
  try {
    const r = await fetch(`/api/md/${dir}/${c.slug}`);
    const text = await r.text();
    document.getElementById('mdcontent').innerHTML = renderMD(text);
  } catch(e) {
    document.getElementById('mdcontent').innerHTML = '<p style="color:var(--t2)">Impossible de charger le contenu.</p>';
  }
}

function closeModal() {
  document.getElementById('mo').classList.remove('on');
  curCreature = null;
}

// ── MD RENDERER ──
function renderMD(text) {
  // Strip YAML frontmatter
  text = text.replace(/^---[\s\S]*?---\n/, '');
  // Strip H1
  text = text.replace(/^# .+\n?/m, '');

  const lines = text.split('\n');
  let html = '';
  let inList = false;
  let inPrompt = false;
  let promptBuf = '';

  const flush = () => {
    if (inList) { html += '</div>'; inList = false; }
  };

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];

    // Section H2
    if (line.startsWith('## ')) {
      flush();
      const title = line.slice(3).trim();
      if (title === 'PROMPT IMAGE') {
        inPrompt = true;
        html += `<div class="md-section"><div class="md-h2">Prompt Image</div>`;
        continue;
      }
      html += `<div class="md-section"><div class="md-h2">${esc(title)}</div>`;
      continue;
    }
    // Section H3
    if (line.startsWith('### ')) {
      flush();
      html += `<div class="md-h3">${esc(line.slice(4))}</div>`;
      continue;
    }
    // Prompt block (collect everything until next section)
    if (inPrompt) {
      if (line.startsWith('## ')) {
        html += `<div class="md-prompt">${esc(promptBuf.trim())}</div></div>`;
        promptBuf = '';
        inPrompt = false;
        // Re-process this line
        i--; continue;
      }
      if (line.trim()) promptBuf += (promptBuf ? ' ' : '') + line.trim();
      continue;
    }
    // List item
    if (line.startsWith('- ')) {
      if (!inList) { html += '<div style="margin-bottom:6px">'; inList = true; }
      html += `<div class="md-li">${inline(line.slice(2))}</div>`;
      continue;
    }
    // Empty line
    if (!line.trim()) {
      flush();
      continue;
    }
    // Paragraph
    flush();
    html += `<p class="md-p">${inline(line)}</p>`;
  }

  flush();
  if (inPrompt && promptBuf) {
    html += `<div class="md-prompt">${esc(promptBuf.trim())}</div></div>`;
  }
  return html;
}

function inline(s) {
  s = esc(s);
  s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/\*(.+?)\*/g, '<span class="md-em">$1</span>');
  s = s.replace(/_(.+?)_/g, '<em>$1</em>');
  return s;
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── DRAG & DROP IMAGES ──
function setZoneImage(page, src) {
  const zone = document.getElementById('zone' + page);
  // Remove old img if any
  zone.querySelectorAll('img').forEach(el => el.remove());
  if (src) {
    const img = document.createElement('img');
    img.src = src + '?t=' + Date.now();
    img.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:contain;';
    zone.insertBefore(img, zone.firstChild);
    zone.classList.add('has-img');
  } else {
    zone.classList.remove('has-img');
  }
}

function onDragOver(e, page) {
  e.preventDefault();
  document.getElementById('zone'+page).classList.add('over');
}
function onDragLeave(page) {
  document.getElementById('zone'+page).classList.remove('over');
}
async function onDrop(e, page) {
  e.preventDefault();
  document.getElementById('zone'+page).classList.remove('over');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) {
    await uploadImage(file, page);
  }
}
async function onFileInput(e, page) {
  const file = e.target.files[0];
  if (file) await uploadImage(file, page);
}

async function uploadImage(file, page) {
  if (!curCreature) return;
  const { dir, slug } = curCreature;
  try {
    const buf = await file.arrayBuffer();
    const r = await fetch(`/api/upload/${dir}/${slug}/${page}`, {
      method: 'POST',
      headers: { 'Content-Type': file.type },
      body: buf
    });
    const json = await r.json();
    if (json.ok) {
      setZoneImage(page, json.path);
      toast(`Page ${page} enregistrée ✓`);
      // Update DATA cache
      const trad = DATA.find(t => t.dir === dir);
      if (trad) {
        const c = trad.creatures.find(c => c.slug === slug);
        if (c) { c['img'+page] = json.path; }
      }
      updateStats();
      if (activeTrad === dir) selectTrad(dir, document.getElementById('sq').value.trim());
    }
  } catch(e) {
    toast('Erreur upload');
  }
}

// ── TOAST ──
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('on');
  setTimeout(() => t.classList.remove('on'), 2500);
}

document.addEventListener('keydown', e => { if(e.key === 'Escape') closeModal(); });

loadData();
</script>
</body>
</html>
