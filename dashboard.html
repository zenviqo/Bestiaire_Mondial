<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bestiaire Mondial</title>
<style>
:root{--bg:#0d0d0d;--s:#161616;--s2:#1e1e1e;--b:#2a2a2a;--a:#c8a96e;--a2:#8b6914;--t:#e8e0d0;--t2:#888;--g:#4caf82;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--t);font-family:Georgia,serif;display:flex;height:100vh;overflow:hidden;}

/* SIDEBAR */
#sb{width:255px;min-width:220px;background:var(--s);border-right:1px solid var(--b);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;}
#sbh{padding:12px 16px;border-bottom:1px solid var(--b);background:linear-gradient(135deg,#1a1206,#1e1e1e);}
#sbh h1{font-size:.85rem;color:var(--a);letter-spacing:2px;text-transform:uppercase;}
#sbh p{font-size:.63rem;color:var(--t2);margin-top:2px;font-style:italic;}
#stats{padding:7px 16px;border-bottom:1px solid var(--b);display:flex;gap:8px;}
.stat{text-align:center;flex:1;}
.stat b{display:block;font-size:1.1rem;color:var(--a);line-height:1.1;}
.stat span{font-size:.58rem;color:var(--t2);text-transform:uppercase;letter-spacing:1px;}

/* Filtre continent */
#zones{padding:8px 10px;border-bottom:1px solid var(--b);display:flex;flex-wrap:wrap;gap:4px;}
#zones label{font-size:.6rem;color:var(--t2);text-transform:uppercase;letter-spacing:1px;width:100%;margin-bottom:2px;}
.zbtn{padding:2px 8px;font-size:.65rem;border:1px solid var(--b);background:transparent;color:var(--t2);cursor:pointer;border-radius:10px;font-family:inherit;transition:all .15s;}
.zbtn:hover{border-color:var(--a2);color:var(--a);}
.zbtn.on{border-color:var(--a);color:var(--a);background:rgba(200,169,110,.12);}

#search{padding:6px 10px;border-bottom:1px solid var(--b);}
#search input{width:100%;background:var(--s2);border:1px solid var(--b);color:var(--t);padding:5px 9px;font-size:.74rem;border-radius:4px;font-family:inherit;outline:none;}
#search input:focus{border-color:var(--a2);}

#tlist{overflow-y:auto;flex:1;}
.titem{padding:7px 14px;border-bottom:1px solid var(--b);cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .12s;}
.titem:hover{background:var(--s2);}
.titem.on{background:rgba(200,169,110,.1);border-left:3px solid var(--a);padding-left:11px;}
.tname{flex:1;font-size:.8rem;}
.tcount{font-size:.68rem;color:var(--a);font-weight:bold;}
.tcount.z{color:var(--t2);font-weight:normal;}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
#mh{padding:9px 18px;border-bottom:1px solid var(--b);background:var(--s);}
#mh h2{font-size:.92rem;color:var(--a);}
#mh .sub{font-size:.68rem;color:var(--t2);margin-top:1px;}

/* Filtre type */
#types{padding:7px 18px;border-bottom:1px solid var(--b);background:var(--s2);display:flex;flex-wrap:wrap;gap:5px;align-items:center;}
#types label{font-size:.6rem;color:var(--t2);text-transform:uppercase;letter-spacing:1px;margin-right:4px;}
.tbtn{padding:3px 10px;font-size:.68rem;border:1px solid var(--b);background:transparent;color:var(--t2);cursor:pointer;border-radius:10px;font-family:inherit;transition:all .15s;}
.tbtn:hover{border-color:var(--a2);color:var(--a);}
.tbtn.on{border-color:var(--a);color:var(--a);background:rgba(200,169,110,.12);}

#gw{flex:1;overflow-y:auto;padding:14px 18px;}
#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px;}
.ccard{background:var(--s);border:1px solid var(--b);border-radius:6px;overflow:hidden;cursor:pointer;transition:all .15s;position:relative;}
.ccard:hover{border-color:var(--a2);transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,0,0,.4);}
.cimg{width:100%;height:105px;background:var(--s2);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;}
.cimg img{width:100%;height:100%;object-fit:cover;object-position:top;}
.noimg{font-size:1.8rem;color:#333;}
.ibadge{position:absolute;bottom:3px;right:3px;background:rgba(76,175,130,.85);color:#fff;font-size:.55rem;padding:1px 4px;border-radius:3px;}
.typebadge{position:absolute;top:3px;left:3px;font-size:.52rem;padding:1px 5px;border-radius:3px;font-weight:bold;text-transform:uppercase;letter-spacing:.4px;}
.ty-creature{background:rgba(60,160,100,.85);color:#fff;}
.ty-esprit{background:rgba(80,110,200,.85);color:#fff;}
.ty-geant{background:rgba(180,70,50,.85);color:#fff;}
.ty-divinite{background:rgba(200,169,110,.9);color:#111;}
.ty-heros{background:rgba(120,80,190,.85);color:#fff;}
.cbody{padding:7px 8px 6px;}
.cnom{font-size:.8rem;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ccat{font-size:.58rem;color:var(--t2);line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
#empty{text-align:center;padding:50px 20px;color:var(--t2);font-style:italic;font-size:.88rem;display:none;}

/* MODAL */
#mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:100;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto;}
#mo.on{display:flex;}
#md{background:var(--s);border:1px solid var(--b);border-radius:8px;width:100%;max-width:800px;margin:auto;}
#mdtop{padding:11px 16px;border-bottom:1px solid var(--b);background:linear-gradient(135deg,#1a1206,#1e1e1e);display:flex;align-items:flex-start;gap:10px;border-radius:8px 8px 0 0;}
#mdnom{font-size:1.05rem;color:var(--a);flex:1;}
#mdcat{font-size:.68rem;color:var(--t2);font-style:italic;margin-top:2px;}
#mdcl{background:none;border:1px solid var(--b);color:var(--t2);width:26px;height:26px;cursor:pointer;border-radius:4px;font-size:.9rem;flex-shrink:0;}
#mdcl:hover{border-color:var(--a);color:var(--a);}
#imgrow{display:flex;gap:10px;padding:10px 14px;border-bottom:1px solid var(--b);background:var(--s2);}
.izone{flex:1;min-height:150px;border:2px dashed var(--b);border-radius:5px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;cursor:pointer;transition:border-color .2s;}
.izone:hover,.izone.over{border-color:var(--a2);}
.izone img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;}
.izone input{position:absolute;inset:0;opacity:0;cursor:pointer;z-index:2;}
.izone .hint{display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--t2);font-size:.68rem;text-align:center;padding:8px;pointer-events:none;z-index:1;}
.izone .hint .ico{font-size:1.6rem;}
.ilabel{position:absolute;top:4px;left:5px;font-size:.58rem;color:var(--a2);background:rgba(0,0,0,.6);padding:1px 5px;border-radius:3px;z-index:3;pointer-events:none;}
.izone.filled .hint{opacity:0;}
.izone.filled:hover .hint{opacity:1;background:rgba(0,0,0,.5);}
#mdcontent{padding:14px 18px;overflow-y:auto;max-height:52vh;font-size:.8rem;line-height:1.7;}
.mh2{font-size:.74rem;color:var(--a);text-transform:uppercase;letter-spacing:2px;border-bottom:1px solid var(--b);padding-bottom:4px;margin:14px 0 6px;}
.mh3{font-size:.72rem;color:var(--a2);margin:8px 0 4px;font-style:italic;}
.mp{margin-bottom:5px;color:var(--t);}
.mli{padding-left:14px;position:relative;margin-bottom:2px;color:var(--t);}
.mli::before{content:"–";position:absolute;left:3px;color:var(--a2);}
.mem{color:var(--a);font-style:italic;}
.mprompt{background:var(--s2);border:1px solid var(--b);border-radius:4px;padding:8px 10px;font-size:.72rem;font-family:monospace;color:var(--t2);word-break:break-word;line-height:1.5;}

#toast{position:fixed;bottom:14px;right:14px;background:var(--s2);border:1px solid var(--b);color:var(--t);padding:7px 13px;border-radius:5px;font-size:.76rem;transform:translateY(40px);opacity:0;transition:all .25s;z-index:300;}
#toast.on{transform:translateY(0);opacity:1;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:var(--s);}::-webkit-scrollbar-thumb{background:var(--b);border-radius:2px;}
</style>
</head>
<body>

<div id="sb">
  <div id="sbh">
    <h1>Bestiaire Mondial</h1>
    <p>Atlas mythologique de l'humanité</p>
  </div>
  <div id="stats">
    <div class="stat"><b id="stc">…</b><span>créatures</span></div>
    <div class="stat"><b id="sti">…</b><span>images</span></div>
    <div class="stat"><b id="stt">…</b><span>traditions</span></div>
  </div>
  <div id="zones">
    <label>Continent</label>
    <button class="zbtn on" data-z="Tous">Tous</button>
    <button class="zbtn" data-z="Europe">Europe</button>
    <button class="zbtn" data-z="Asie">Asie</button>
    <button class="zbtn" data-z="Amériques">Amériques</button>
    <button class="zbtn" data-z="Afrique">Afrique</button>
    <button class="zbtn" data-z="Océanie">Océanie</button>
    <button class="zbtn" data-z="Monde">Monde</button>
  </div>
  <div id="search"><input id="sq" type="text" placeholder="Rechercher…" oninput="refresh()"></div>
  <div id="tlist"></div>
</div>

<div id="main">
  <div id="mh">
    <h2 id="mtitle">Sélectionner une tradition</h2>
    <div class="sub" id="msub"></div>
  </div>
  <div id="types">
    <label>Type</label>
    <button class="tbtn on" data-t="tous">Tous</button>
    <button class="tbtn" data-t="creature">🐉 Créatures</button>
    <button class="tbtn" data-t="esprit">👻 Esprits</button>
    <button class="tbtn" data-t="geant">🗿 Géants</button>
    <button class="tbtn" data-t="divinite">⚡ Divinités</button>
    <button class="tbtn" data-t="heros">⚔️ Héros</button>
  </div>
  <div id="gw">
    <div id="grid"></div>
    <div id="empty">Sélectionne une tradition dans le menu</div>
  </div>
</div>

<div id="mo" onclick="if(event.target===this)closeM()">
  <div id="md">
    <div id="mdtop">
      <div style="flex:1"><div id="mdnom">—</div><div id="mdcat"></div></div>
      <button id="mdcl" onclick="closeM()">✕</button>
    </div>
    <div id="imgrow">
      <div class="izone" id="z1" ondragover="ov(event,1)" ondrop="dp(event,1)" ondragleave="ol(1)">
        <span class="ilabel">Page 1</span>
        <input type="file" accept="image/*" onchange="fi(event,1)">
        <div class="hint"><div class="ico">🖼</div>Déposer ou cliquer<br><small>Image AI page 1</small></div>
      </div>
      <div class="izone" id="z2" ondragover="ov(event,2)" ondrop="dp(event,2)" ondragleave="ol(2)">
        <span class="ilabel">Page 2</span>
        <input type="file" accept="image/*" onchange="fi(event,2)">
        <div class="hint"><div class="ico">🦴</div>Déposer ou cliquer<br><small>Image AI page 2</small></div>
      </div>
    </div>
    <div id="mdcontent"></div>
  </div>
</div>
<div id="toast"></div>

<script>
let DATA=[], activeTrad=null, activeZone='Tous', activeType='tous', cur=null;

async function init(){
  try{
    const r=await fetch('/api/data');
    DATA=await r.json();
    let tc=0,ti=0,tt=0;
    DATA.forEach(t=>{tc+=t.creatures.length;if(t.creatures.length)tt++;t.creatures.forEach(c=>{if(c.img1||c.img2)ti++;});});
    document.getElementById('stc').textContent=tc;
    document.getElementById('sti').textContent=ti;
    document.getElementById('stt').textContent=tt;
    renderSB();
    document.getElementById('empty').style.display='block';
  }catch(e){
    document.getElementById('empty').textContent='Erreur : serveur non démarré. Lance start.sh dans Terminal.';
    document.getElementById('empty').style.display='block';
  }
}

function refresh(){renderSB();if(activeTrad)showTrad(activeTrad);}

function renderSB(){
  const q=document.getElementById('sq').value.trim().toLowerCase();
  const tlist=document.getElementById('tlist');
  tlist.innerHTML='';
  DATA.forEach(t=>{
    if(activeZone!=='Tous'&&t.zone!==activeZone)return;
    let list=t.creatures;
    if(q)list=list.filter(c=>c.nom.toLowerCase().includes(q)||c.slug.toLowerCase().includes(q));
    if(activeType!=='tous')list=list.filter(c=>c.type===activeType);
    const div=document.createElement('div');
    div.className='titem'+(activeTrad===t.dir?' on':'');
    div.innerHTML=`<span class="tname">${t.label}</span><span class="tcount ${list.length?'':'z'}">${list.length}</span>`;
    div.onclick=()=>showTrad(t.dir);
    tlist.appendChild(div);
  });
}

function showTrad(dir){
  activeTrad=dir;
  const trad=DATA.find(t=>t.dir===dir);
  if(!trad)return;
  const q=document.getElementById('sq').value.trim().toLowerCase();
  let list=trad.creatures;
  if(q)list=list.filter(c=>c.nom.toLowerCase().includes(q)||c.slug.toLowerCase().includes(q));
  if(activeType!=='tous')list=list.filter(c=>c.type===activeType);
  document.getElementById('mtitle').textContent=trad.label;
  document.getElementById('msub').textContent=`${list.length} entrée${list.length>1?'s':''} · ${trad.zone}`;
  renderGrid(dir,list);
  renderSB();
}

function renderGrid(dir,list){
  const grid=document.getElementById('grid');
  const empty=document.getElementById('empty');
  grid.innerHTML='';
  if(!list.length){empty.style.display='block';empty.textContent='Aucune entrée pour ces filtres';return;}
  empty.style.display='none';
  list.forEach(c=>{
    const card=document.createElement('div');
    card.className='ccard';
    const imgH=c.img1?`<img src="${c.img1}?t=${Date.now()}" loading="lazy" alt="">`:`<div class="noimg">☽</div>`;
    const ib=(c.img1||c.img2)?`<div class="ibadge">📷${(c.img1?1:0)+(c.img2?1:0)}/2</div>`:'';
    const tc={creature:'ty-creature',esprit:'ty-esprit',geant:'ty-geant',divinite:'ty-divinite',heros:'ty-heros'}[c.type]||'ty-creature';
    const tb=`<div class="typebadge ${tc}">${c.type||'?'}</div>`;
    card.innerHTML=`<div class="cimg">${imgH}${ib}${tb}</div><div class="cbody"><div class="cnom">${c.nom}</div><div class="ccat">${c.categorie}</div></div>`;
    card.onclick=()=>openM(dir,c);
    grid.appendChild(card);
  });
}

// Zone buttons
document.querySelectorAll('.zbtn').forEach(b=>{
  b.onclick=()=>{
    activeZone=b.dataset.z;
    document.querySelectorAll('.zbtn').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    activeTrad=null;
    document.getElementById('mtitle').textContent='Sélectionner une tradition';
    document.getElementById('msub').textContent='';
    document.getElementById('grid').innerHTML='';
    document.getElementById('empty').style.display='block';
    document.getElementById('empty').textContent='Sélectionne une tradition dans le menu';
    renderSB();
  };
});

// Type buttons
document.querySelectorAll('.tbtn').forEach(b=>{
  b.onclick=()=>{
    activeType=b.dataset.t;
    document.querySelectorAll('.tbtn').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    if(activeTrad)showTrad(activeTrad);
    else renderSB();
  };
});

// Modal
async function openM(dir,c){
  cur={dir,slug:c.slug,nom:c.nom,categorie:c.categorie};
  document.getElementById('mdnom').textContent=c.nom;
  document.getElementById('mdcat').textContent=c.categorie;
  setZone(1,c.img1);setZone(2,c.img2);
  document.getElementById('mdcontent').innerHTML='<p style="color:var(--t2);font-style:italic">Chargement…</p>';
  document.getElementById('mo').classList.add('on');
  try{
    const r=await fetch(`/api/md/${dir}/${c.slug}`);
    document.getElementById('mdcontent').innerHTML=renderMD(await r.text());
  }catch(e){document.getElementById('mdcontent').innerHTML='<p style="color:var(--t2)">Impossible de charger.</p>';}
}
function closeM(){document.getElementById('mo').classList.remove('on');cur=null;}

function setZone(p,src){
  const z=document.getElementById('z'+p);
  z.querySelectorAll('img').forEach(e=>e.remove());
  if(src){
    const img=document.createElement('img');
    img.src=src+'?t='+Date.now();
    z.insertBefore(img,z.firstChild);
    z.classList.add('filled');
  }else z.classList.remove('filled');
}

function ov(e,p){e.preventDefault();document.getElementById('z'+p).classList.add('over');}
function ol(p){document.getElementById('z'+p).classList.remove('over');}
async function dp(e,p){e.preventDefault();ol(p);const f=e.dataTransfer.files[0];if(f&&f.type.startsWith('image/'))await upload(f,p);}
async function fi(e,p){const f=e.target.files[0];if(f)await upload(f,p);}
async function upload(f,p){
  if(!cur)return;
  const buf=await f.arrayBuffer();
  const r=await fetch(`/api/upload/${cur.dir}/${cur.slug}/${p}`,{method:'POST',headers:{'Content-Type':f.type},body:buf});
  const j=await r.json();
  if(j.ok){
    setZone(p,j.path);toast(`Page ${p} sauvegardée ✓`);
    const trad=DATA.find(t=>t.dir===cur.dir);
    if(trad){const c=trad.creatures.find(c=>c.slug===cur.slug);if(c)c['img'+p]=j.path;}
    if(activeTrad===cur.dir)showTrad(cur.dir);
  }
}

function renderMD(text){
  text=text.replace(/^---[\s\S]*?---\n/,'').replace(/^# .+\n?/m,'');
  const lines=text.split('\n');
  let html='',inList=false,inPrompt=false,pbuf='';
  const flush=()=>{if(inList){html+='</div>';inList=false;}};
  for(let i=0;i<lines.length;i++){
    const l=lines[i];
    if(l.startsWith('## ')){
      flush();const t=l.slice(3).trim();
      if(t==='PROMPT IMAGE'){inPrompt=true;html+=`<div class="mh2">Prompt Image</div>`;continue;}
      html+=`<div class="mh2">${e(t)}</div>`;continue;
    }
    if(l.startsWith('### ')){flush();html+=`<div class="mh3">${e(l.slice(4))}</div>`;continue;}
    if(inPrompt){
      if(l.startsWith('## ')){html+=`<div class="mprompt">${e(pbuf.trim())}</div>`;pbuf='';inPrompt=false;i--;continue;}
      if(l.trim())pbuf+=(pbuf?' ':'')+l.trim();continue;
    }
    if(l.startsWith('- ')){if(!inList){html+='<div>';inList=true;}html+=`<div class="mli">${il(l.slice(2))}</div>`;continue;}
    if(!l.trim()){flush();continue;}
    flush();html+=`<p class="mp">${il(l)}</p>`;
  }
  flush();
  if(inPrompt&&pbuf)html+=`<div class="mprompt">${e(pbuf.trim())}</div>`;
  return html;
}
function e(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function il(s){return e(s).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<span class="mem">$1</span>');}

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2500);}
document.addEventListener('keydown',ev=>{if(ev.key==='Escape')closeM();});
init();
</script>
</body>
</html>
